# Package the addon and publish a GitHub Release whenever a version tag is pushed.
#
#   git tag v0.7.1        # tag must match the ## Version in LootCouncilEX.toc
#   git push origin v0.7.1
#
# The BigWigs packager builds LootCouncilEX-<version>.zip (top folder = LootCouncilEX, so it
# extracts straight into Interface/AddOns), sets the .toc Version to the tag, and attaches it
# to a GitHub Release. WowUp tracks that release for one-click updates.
name: Package and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow a manual run from the Actions tab

permissions:
  contents: write # the packager needs this to create the Release and upload the zip

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the packager can build the changelog

      - name: Package and create release
        uses: BigWigsMods/packager@v2
        env:
          # The packager reads the token from GITHUB_OAUTH (NOT GITHUB_TOKEN); the value is the
          # auto-provided secrets.GITHUB_TOKEN. Naming it GITHUB_TOKEN makes it silently skip the
          # GitHub release (still exits success) — it must be GITHUB_OAUTH.
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      # Defensive cleanup: drop the BigWigs/WoWUp `release.json` manifest the packager attaches.
      # We don't publish to CurseForge/Wago, so it serves no purpose here, and leaving only the
      # zip keeps WowUp on its simplest install path (it never enters the release-metadata branch).
      # NOTE: release.json is NOT what broke "Install from URL". The real cause was a GitHub
      # Personal Access Token configured in WowUp: with a token, WowUp-CF v2.22.0 downloads the
      # asset from api.github.com/.../releases/assets/<id> but omits `Accept: application/octet-
      # stream` on the file download, so GitHub returns the asset's JSON metadata, WowUp saves it
      # as the .zip, and unzip dies with "end of central directory record signature not found".
      # With no token it uses browser_download_url, which always returns the binary. So the user
      # fix is "no GitHub token in WowUp"; this step is just hygiene.
      - name: Strip release.json (hygiene; not the install fix)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete-asset "${GITHUB_REF_NAME}" release.json --yes
